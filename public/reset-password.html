<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reset Password – MyCPD App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #eef4ff, #f8fbff);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
      box-sizing: border-box;
    }

    .card {
      background: #fff;
      padding: 30px;
      border-radius: 18px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.08);
      border: 1px solid #e5e7eb;
    }

    h1 {
      text-align: center;
      color: #2563eb;
      margin-bottom: 6px;
      font-size: 22px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 18px;
      color: #0f172a;
    }

    p.helper {
      text-align: center;
      color: #64748b;
      font-size: 14px;
      line-height: 1.6;
      margin-top: 0;
      margin-bottom: 18px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      margin-bottom: 14px;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(37,99,235,0.3);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .message {
      margin-top: 14px;
      text-align: center;
      font-size: 14px;
      color: #475569;
      line-height: 1.5;
      white-space: pre-line;
    }

    .error {
      color: #dc2626;
    }

    .success {
      color: #16a34a;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>MyCPD</h1>
    <h2>Set a New Password</h2>
    <p class="helper">Enter your new password below to finish resetting your account.</p>

    <form id="resetForm">
      <input type="password" id="password" placeholder="New password" autocomplete="new-password" />
      <input type="password" id="confirmPassword" placeholder="Confirm password" autocomplete="new-password" />

      <button type="submit" id="submitBtn">Update Password</button>
    </form>

    <div id="message" class="message"></div>
  </div>

  <script>
    const supabase = window.supabase.createClient(
      "https://cdldqmehwdrebusdmpuz.supabase.co",
      "sb_publishable_xjuN_GcUt1v08meBGaN2uA_z3r4CCZy"
    );

    const messageEl = document.getElementById("message");
    const submitBtn = document.getElementById("submitBtn");
    let recoveryReady = false;

    function showMessage(text, type = "") {
      messageEl.className = "message";
      if (type) messageEl.classList.add(type);
      messageEl.innerText = text;
    }

    async function setSessionFromUrl() {
      try {
        // 1. Try the normal Supabase exchange from URL first
        const { data, error } = await supabase.auth.exchangeCodeForSession(window.location.href);

        if (!error && data?.session) {
          recoveryReady = true;
          return true;
        }

        // 2. Fallback: try tokens from hash
        const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ""));
        const hashAccessToken = hashParams.get("access_token");
        const hashRefreshToken = hashParams.get("refresh_token");
        const hashType = hashParams.get("type");

        if (hashAccessToken && hashRefreshToken && (!hashType || hashType === "recovery")) {
          const { error: sessionError } = await supabase.auth.setSession({
            access_token: hashAccessToken,
            refresh_token: hashRefreshToken,
          });

          if (sessionError) throw sessionError;

          recoveryReady = true;
          return true;
        }

        // 3. Fallback: try tokens from query string
        const queryParams = new URLSearchParams(window.location.search);
        const queryAccessToken = queryParams.get("access_token");
        const queryRefreshToken = queryParams.get("refresh_token");
        const queryType = queryParams.get("type");

        if (queryAccessToken && queryRefreshToken && (!queryType || queryType === "recovery")) {
          const { error: sessionError } = await supabase.auth.setSession({
            access_token: queryAccessToken,
            refresh_token: queryRefreshToken,
          });

          if (sessionError) throw sessionError;

          recoveryReady = true;
          return true;
        }

        showMessage("This reset link is invalid or has expired. Please request a new password reset email.", "error");
        return false;
      } catch (error) {
        showMessage(
          (error && error.message) || "Unable to verify this reset link. Please request a new one.",
          "error"
        );
        return false;
      }
    }

    async function resetPassword(event) {
      event.preventDefault();

      const password = document.getElementById("password").value.trim();
      const confirm = document.getElementById("confirmPassword").value.trim();

      showMessage("");

      if (!recoveryReady) {
        showMessage("This reset session is not ready. Please reopen the link from your email.", "error");
        return;
      }

      if (!password || password.length < 6) {
        showMessage("Password must be at least 6 characters.", "error");
        return;
      }

      if (password !== confirm) {
        showMessage("Passwords do not match.", "error");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerText = "Updating...";

      try {
        const { error } = await supabase.auth.updateUser({
          password: password,
        });

        if (error) throw error;

        showMessage("Password updated successfully. You can now return to the app and log in.", "success");

        setTimeout(() => {
          window.location.href = "https://mycpdapp.com";
        }, 2500);
      } catch (error) {
        showMessage(
          (error && error.message) || "Failed to update password. Please request a new reset link and try again.",
          "error"
        );
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = "Update Password";
      }
    }

    document.getElementById("resetForm").addEventListener("submit", resetPassword);

    setSessionFromUrl();
  </script>
</body>
</html>
