<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reset Password – MyCPD App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #eef4ff, #f8fbff);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      padding: 30px;
      border-radius: 18px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.08);
      border: 1px solid #e5e7eb;
    }

    h1 {
      text-align: center;
      color: #2563eb;
      margin-bottom: 6px;
      font-size: 22px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 18px;
      color: #0f172a;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      margin-bottom: 14px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(37,99,235,0.3);
    }

    .message {
      margin-top: 14px;
      text-align: center;
      font-size: 14px;
      color: #475569;
    }

    .error {
      color: #dc2626;
    }

    .success {
      color: #16a34a;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>MyCPD</h1>
  <h2>Set a New Password</h2>

  <input type="password" id="password" placeholder="New password" />
  <input type="password" id="confirmPassword" placeholder="Confirm password" />

  <button onclick="resetPassword()">Update Password</button>

  <div id="message" class="message"></div>
</div>

<script>
  // 🔑 REPLACE THESE WITH YOUR SUPABASE KEYS
  const supabase = window.supabase.createClient(
    "https://cdldqmehwdrebusdmpuz.supabase.co",
    "sb_publishable_xjuN_GcUt1v08meBGaN2uA_z3r4CCZy"
  );

  async function setSessionFromUrl() {
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);

    const access_token = params.get("access_token");
    const refresh_token = params.get("refresh_token");

    if (access_token && refresh_token) {
      await supabase.auth.setSession({
        access_token,
        refresh_token,
      });
    }
  }

  async function resetPassword() {
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirmPassword").value;
    const messageEl = document.getElementById("message");

    messageEl.className = "message";

    if (!password || password.length < 6) {
      messageEl.innerText = "Password must be at least 6 characters.";
      messageEl.classList.add("error");
      return;
    }

    if (password !== confirm) {
      messageEl.innerText = "Passwords do not match.";
      messageEl.classList.add("error");
      return;
    }

    const { error } = await supabase.auth.updateUser({
      password: password,
    });

    if (error) {
      messageEl.innerText = error.message;
      messageEl.classList.add("error");
    } else {
      messageEl.innerText = "Password updated successfully. You can now log in.";
      messageEl.classList.add("success");
    }
  }

  // Run on page load
  setSessionFromUrl();
</script>

</body>
</html>
